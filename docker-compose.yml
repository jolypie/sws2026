services:

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5440:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Apache web server
  apache:
    build: ./apache
    ports:
      - "80:80"
    volumes:
      - ./hosted-sites:/usr/local/apache2/htdocs/
      - ./apache-config:/usr/local/apache2/conf/extra/
    depends_on:
      - db

  # Node.js backend
  backend:
    build: ./backend
    ports:
      - "8765:${PORT}"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./hosted-sites:/app/hosted-sites
      - ./apache-config:/app/apache-config
      - ./db/migrations:/app/db/migrations
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  # React frontend
  frontend:
    build: ./frontend
    ports:
      - "5274:5274"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # Pure-FTPd server
  ftp:
    build: ./ftp
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    environment:
      - PUBLICHOST=localhost
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    volumes:
      - ./hosted-sites:/home/ftpusers
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
