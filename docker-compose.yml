services:

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5440:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  # Apache web server
  apache:
    build: ./apache
    ports:
      - "80:80"
    volumes:
      - ./hosted-sites:/usr/local/apache2/htdocs/
      - ./apache-config:/usr/local/apache2/conf/extra/
    depends_on:
      - db

  # Node.js backend
  backend:
    build: ./backend
    ports:
      - "8765:8765"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - PORT=${PORT}
    volumes:
      - ./hosted-sites:/app/hosted-sites
      - ./apache-config:/app/apache-config
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db

  # React frontend
  frontend:
    build: ./frontend
    ports:
      - "5274:5274"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # Pure-FTPd server
  ftp:
    build: ./ftp
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    environment:
      - PUBLICHOST=localhost
      - FTP_USER=${FTP_USER}
      - FTP_PASSWORD=${FTP_PASSWORD}
    volumes:
      - ./hosted-sites:/home/ftpusers/${FTP_USER}

volumes:
  db_data:
